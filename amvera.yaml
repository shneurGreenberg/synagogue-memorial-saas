# Amvera Cloud (Russia) — https://amvera.ru
# Deploy: connect GitHub repo → push to Amvera remote, set env vars in dashboard.
meta:
  environment: node
  toolchain:
    name: npm
    version: "20"

build:
  additionalCommands: npm run build:board

run:
  command: sh -c "node scripts/seed.js || true && node app.js"
  containerPort: 3000
  # Set in Amvera dashboard: MONGODB_URI, SESSION_SECRET, NODE_ENV=production, TRUST_PROXY=1
  # Push photos/ to GitHub before deploy: git add -f photos/ && git push
